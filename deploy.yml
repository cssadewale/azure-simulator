name: Deploy Azure Simulator to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Validate job ──────────────────────────────────────────────────────────
  validate:
    name: Validate HTML & Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          if [ ! -f "index.html" ]; then
            echo "ERROR: index.html not found!"
            exit 1
          fi
          echo "✓ index.html found"

      - name: Check required files
        run: |
          files=(
            "index.html"
            "README.md"
            "LICENSE"
            ".gitignore"
            "styles/main.css"
            "styles/sidebar.css"
            "styles/dashboard.css"
            "styles/services.css"
            "styles/modals.css"
            "js/data.js"
            "js/state.js"
            "js/router.js"
            "js/terminal.js"
            "js/search.js"
            "js/learning.js"
            "js/main.js"
            "js/pages/dashboard.js"
            "js/pages/compute.js"
            "js/pages/storage.js"
            "js/pages/data-analytics.js"
            "js/pages/networking.js"
            "js/pages/security.js"
            "js/pages/devops.js"
            "js/pages/monitor.js"
            "js/pages/all-resources.js"
            "assets/azure-icon.svg"
          )
          all_ok=true
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ MISSING: $f"
              all_ok=false
            fi
          done
          if [ "$all_ok" = false ]; then
            exit 1
          fi
          echo ""
          echo "All required files present!"

      - name: Check for sensitive data
        run: |
          # Fail if any real API keys or passwords are accidentally committed
          if grep -r "sk-[a-zA-Z0-9]\{32,\}" . --include="*.js" --include="*.html" --include="*.css" 2>/dev/null; then
            echo "ERROR: Possible API key detected!"
            exit 1
          fi
          if grep -r "password\s*=\s*['\"][^'\"]\{8,\}['\"]" . --include="*.js" 2>/dev/null | grep -v "placeholder\|example\|fake\|sim"; then
            echo "WARNING: Possible hardcoded password detected — please review"
          fi
          echo "✓ No sensitive data detected"

  # ── Deploy job ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "========================================"
          echo "  Azure Simulator Deployed Successfully!"
          echo "========================================"
          echo ""
          echo "  Author:  Adewale Adeagbo"
          echo "  GitHub:  https://github.com/cssadewale"
          echo "  Site:    ${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "  The simulator is now live!"
          echo "========================================"
